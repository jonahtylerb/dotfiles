color2       {{colors.secondary.default.hex | set_lightness 40}}
color10      {{colors.secondary.default.hex | set_lightness 55}}
color3       {{colors.tertiary.default.hex | set_lightness 40}}
color11      {{colors.tertiary.default.hex | set_lightness 55}}
color4       {{colors.primary.default.hex | set_lightness 40}}
color12      {{colors.primary.default.hex | set_lightness 55}}
color5       {{colors.primary_fixed_dim.default.hex | set_lightness 40}}
color13      {{colors.primary_fixed_dim.default.hex | set_lightness 55}}
